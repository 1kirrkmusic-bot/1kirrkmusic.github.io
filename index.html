<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="5e768b1be65802df291787894e323fbe">
<meta name="description" content="1Kirrk official page. Stream Hood Blues EP.">

<title>1Kirrk — HOOD BLUES</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* ⏳ LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2em;
  z-index: 999;
}

/* 🌑 BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('cover.jpg') center/cover no-repeat;
  filter: blur(25px) brightness(0.2);
  z-index: -3;
}

/* 🌫️ FOG */
.fog, .fog2 {
  position: fixed;
  width: 200%;
  height: 200%;
  background: url('https://i.imgur.com/8IuucQZ.png') repeat;
  opacity: 0.12;
  z-index: -2;
}
.fog { animation: moveFog 60s linear infinite; }
.fog2 { animation: moveFog 90s linear infinite reverse; }

@keyframes moveFog {
  from { transform: translate(0,0); }
  to { transform: translate(-50%, -50%); }
}

/* HEADER */
header {
  padding: 60px 20px 20px;
}

/* GLOW */
.glow {
  color: #b89cff;
  text-shadow: 0 0 5px #6a00ff, 0 0 15px #6a00ff;
}

/* COVER */
.cover img {
  width: 90%;
  max-width: 320px;
  border-radius: 12px;
  margin: 20px 0;
  box-shadow: 0 0 40px #6a00ff;
}

/* LINKS */
.buttons a {
  display: block;
  margin: 10px auto;
  padding: 14px;
  width: 85%;
  max-width: 320px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: linear-gradient(45deg, #111, #6a00ff);
  transition: 0.3s;
}
.buttons a:hover {
  transform: scale(1.05);
}

/* TYPEWRITER */
#typewriter {
  max-width: 500px;
  margin: auto;
  color: #aaa;
  border-right: 2px solid #6a00ff;
  white-space: nowrap;
  overflow: hidden;
}

/* SPOTIFY */
.spotify {
  margin: 30px auto;
  width: 90%;
  max-width: 400px;
}

/* FOOTER */
footer {
  margin: 60px 0;
  color: #555;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">HOOD BLUES</div>

<div class="bg"></div>
<div class="fog"></div>
<div class="fog2"></div>

<header>
  <h1 class="glow">1Kirrk</h1>
  <p class="glow">HOOD BLUES — OUT NOW</p>
</header>

<section class="cover">
  <img src="cover.jpg">
</section>

<!-- SPOTIFY -->
<div class="spotify">
  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/album/4PJfvvXo03JwCot9CG3yBu"
    width="100%" height="152"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>
</div>

<!-- TYPEWRITER ABOUT -->
<section>
  <h2 class="glow">About</h2>
  <p id="typewriter"></p>
</section>

<!-- STREAM LINKS -->
<section class="buttons">

  <a href="https://open.spotify.com/album/4PJfvvXo03JwCot9CG3yBu" target="_blank">🎧 Spotify</a>

  <a href="https://music.apple.com/ke/album/hood-blues-ep/1895704865" target="_blank">🍎 Apple Music</a>

  <a href="https://youtube.com/playlist?list=OLAK5uy_nfO2vh5BxzlZE997_VtRH3944a7TYDExk" target="_blank">▶ YouTube</a>

  <a href="https://www.instagram.com/kirrk" target="_blank">📱 Instagram</a>

  <a href="https://music.amazon.com/albums/B0GYRMR9G7?marketplaceId=ATVPDKIKX0DER&musicTerritory=US&ref=dm_sh_sG1r4pn6XTLjmrfhv9MmPVkdn" target="_blank">🟠 Amazon Music</a>

  <a href="https://link.deezer.com/s/33bkqiymJB4vMbUE1losQ" target="_blank">🎵 Deezer</a>

  <a href="https://tidal.com/album/519727193/u" target="_blank">🌊 Tidal</a>

</section>

<footer>
  © 1Kirrk — HOOD BLUES
</footer>

<!-- TYPEWRITER SCRIPT -->
<script>
const text = "1Kirrk is an emerging artist turning pressure into sound. Hood Blues captures a raw vibe and survival through verses.";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typewriter").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 45);
  }
}

window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    typeWriter();
  }, 1500);
});
</script>

</body>
</html>
