<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="5e768b1be65802df291787894e323fbe">
<meta name="description" content="1Kirrk — HOOD BLUES EP. Nairobi night vibe. Stream now on all platforms.">

<title>1Kirrk — HOOD BLUES</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 🌃 NAIROBI NIGHT BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
  filter: brightness(0.18) contrast(1.3) saturate(0.9);
  z-index: -3;
  animation: zoom 30s ease-in-out infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* 🌫️ FOG */
.fog {
  position: fixed;
  width: 200%;
  height: 200%;
  background: url('https://i.imgur.com/8IuucQZ.png') repeat;
  opacity: 0.12;
  mix-blend-mode: screen;
  animation: drift 80s linear infinite;
  z-index: -2;
}

@keyframes drift {
  from { transform: translate(0,0); }
  to { transform: translate(-50%, -50%); }
}

/* HEADER */
header {
  text-align: center;
  padding: 70px 20px 10px;
}

h1 {
  font-size: 3em;
  letter-spacing: 4px;
  margin: 0;
}

.glow {
  color: #c2a6ff;
  text-shadow: 0 0 10px #6a00ff, 0 0 25px #6a00ff;
}

/* COVER */
.cover {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.cover img {
  width: 85%;
  max-width: 340px;
  border-radius: 15px;
  box-shadow: 0 0 50px rgba(106,0,255,0.6);
}

/* PARAGRAPH STYLE TEXT */
.about {
  max-width: 700px;
  margin: 25px auto;
  padding: 0 20px;
  line-height: 1.8;
  color: #cfcfcf;
  text-align: center;
  font-size: 0.95em;
}

/* TYPEWRITER */
#typewriter {
  border-right: 2px solid #6a00ff;
  display: inline-block;
  white-space: normal;
  word-wrap: break-word;
}

/* SPOTIFY */
.spotify {
  margin: 25px auto;
  max-width: 420px;
  width: 90%;
}

/* LINKS */
.links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  max-width: 700px;
  margin: 30px auto;
  padding: 0 20px;
}

.links a {
  text-decoration: none;
  padding: 12px;
  border-radius: 10px;
  background: rgba(20,20,20,0.75);
  color: white;
  border: 1px solid rgba(106,0,255,0.3);
  transition: 0.3s;
  text-align: center;
}

.links a:hover {
  transform: translateY(-3px);
  border-color: #6a00ff;
  box-shadow: 0 0 15px rgba(106,0,255,0.4);
}

/* FOOTER */
footer {
  text-align: center;
  margin: 60px 0;
  color: #555;
  font-size: 0.8em;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>

<header>
  <h1 class="glow">1Kirrk</h1>
  <p class="glow">HOOD BLUES — NAIROBI NIGHT FREQUENCIES</p>
</header>

<!-- COVER CENTERED -->
<div class="cover">
  <img src="cover.jpg" alt="Hood Blues Cover">
</div>

<!-- TYPEWRITER TEXT (RESPONSIVE PARAGRAPH STYLE) -->
<div class="about">
  <p id="typewriter"></p>
</div>

<!-- SPOTIFY -->
<div class="spotify">
  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/album/4PJfvvXo03JwCot9CG3yBu"
    width="100%" height="152"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>
</div>

<!-- LINKS -->
<div class="links">

  <a href="https://open.spotify.com/album/4PJfvvXo03JwCot9CG3yBu">Spotify</a>
  <a href="https://music.apple.com/ke/album/hood-blues-ep/1895704865">Apple</a>
  <a href="https://youtube.com/playlist?list=OLAK5uy_nfO2vh5BxzlZE997_VtRH3944a7TYDExk">YouTube</a>
  <a href="https://www.instagram.com/kirrk">Instagram</a>
  <a href="https://music.amazon.com/albums/B0GYRMR9G7?marketplaceId=ATVPDKIKX0DER&musicTerritory=US&ref=dm_sh_sG1r4pn6XTLjmrfhv9MmPVkdn">Amazon</a>
  <a href="https://link.deezer.com/s/33bkqiymJB4vMbUE1losQ">Deezer</a>
  <a href="https://tidal.com/album/519727193/u">Tidal</a>

</div>

<footer>
© 1Kirrk — HOOD BLUES
</footer>

<script>
const text = "From Nairobi nights to late city motion, 1Kirrk captures a raw vibe through verses that move through silence, light, and street energy.";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typewriter").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

window.onload = () => {
  setTimeout(typeWriter, 1000);
};
</script>

</body>
</html>
